version: "3.9"
services:
  kernelflow:
    build: .
    ports:
      - "8080:8080"   # GraphQL
      - "9090:9090"   # Prometheus
    environment:
      RUST_LOG: info,kernelflow=debug
      KF_HTTP_ADDR: 0.0.0.0:8080
      KF_DATA_DIR: /data
    volumes:
      - kf-data:/data
volumes:
  kf-data: {}

